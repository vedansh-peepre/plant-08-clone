<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explore Plants - plant.08</title>
    <link rel="stylesheet" href="CSS/style.css">
    <link rel="stylesheet" href="CSS/explore.css">
    <link rel="icon" href="plant-08_logo-removebg-preview.png" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <div style="font-size: 32px;">🌿</div>
                <span>plant.08</span>
            </div>
            <p class="tagline">Browse our complete plant collection</p>
        </header>

        <!-- Filter Section -->
        <div class="filter-section">
            <div class="filter-container">
                <label for="categoryFilter">Filter by Category:</label>
                <select id="categoryFilter" class="filter-select">
                    <option value="">All Categories</option>
                    <option value="Vegetable">Vegetables</option>
                    <option value="Herb">Herbs</option>
                    <option value="Flower">Flowers</option>
                    <option value="Fruit">Fruits</option>
                </select>
            </div>
        </div>

        <!-- Plants Grid -->
        <main class="main-content">
            <div id="plantsGrid" class="plants-grid">
                <!-- Plants will be loaded here by JavaScript -->
            </div>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <p>&copy; 2026 plant.08 - Open-source plant care guide. Made with 🌱 for beginners.</p>
        </footer>
    </div>

    <!-- Scripts -->
    <script src="JS/guide-data.js"></script>
    <script src="JS/explore.js"></script>
    
    <!-- Sound Effects -->
    <script src="JS/soundManager.js"></script>
</body>
</html>
