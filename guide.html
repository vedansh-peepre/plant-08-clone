<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plant Care Guide - plant.08</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="guide.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <a href="index.html" class="back-link">← Back to Home</a>
            <h1 class="logo">📋 <span id="plantTitle"></span> Care Guide</h1>
            <p class="tagline" id="stageSubtitle"></p>
        </header>

        <!-- Guide Content -->
        <main class="main-content guide-content">
            <!-- Plant Overview -->
            <section class="overview-section">
                <h2>About Your Plant</h2>
                <p id="plantOverview"></p>
            </section>

            <!-- Care Instructions Grid -->
            <section class="care-section">
                <div class="care-grid">
                    <!-- Soil -->
                    <div class="care-card">
                        <div class="care-icon">🪴</div>
                        <h3>Soil</h3>
                        <div id="soilInfo" class="care-info"></div>
                    </div>

                    <!-- Water -->
                    <div class="care-card">
                        <div class="care-icon">💧</div>
                        <h3>Water</h3>
                        <div id="waterInfo" class="care-info"></div>
                    </div>

                    <!-- Sunlight -->
                    <div class="care-card">
                        <div class="care-icon">☀️</div>
                        <h3>Sunlight</h3>
                        <div id="sunlightInfo" class="care-info"></div>
                    </div>

                    <!-- Environment -->
                    <div class="care-card">
                        <div class="care-icon">🌍</div>
                        <h3>Environment</h3>
                        <div id="environmentInfo" class="care-info"></div>
                    </div>

                    <!-- Temperature -->
                    <div class="care-card">
                        <div class="care-icon">🌡️</div>
                        <h3>Temperature</h3>
                        <div id="temperatureInfo" class="care-info"></div>
                    </div>

                    <!-- Pest Checks -->
                    <div class="care-card">
                        <div class="care-icon">🐛</div>
                        <h3>Pest Checks</h3>
                        <div id="pestInfo" class="care-info"></div>
                    </div>
                </div>
            </section>

            <!-- Additional Tips -->
            <section class="tips-section">
                <h2>Additional Tips</h2>
                <div id="tipsContent" class="tips-list"></div>
            </section>
        </main>

        <!-- Navigation -->
        <section class="navigation-section">
            <a href="stage.html" class="btn btn-secondary">← Change Stage</a>
            <a href="index.html" class="btn btn-secondary">Back to Home</a>
        </section>

        <!-- Footer -->
        <footer class="footer">
            <p>&copy; 2026 plant.08 - Open-source plant care guide. Made with 🌱 for beginners.</p>
        </footer>
    </div>

    <!-- Scripts -->
    <script src="plants-data.js"></script>
    <script src="guide-data.js"></script>
    <script src="guide.js"></script>
</body>
</html>
